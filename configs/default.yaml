# Default training configuration

# Model settings
model: yolov8n.pt

# Training hyperparameters
epochs: 100
imgsz: 640
batch: 16
patience: 50
lr0: 0.01
lrf: 0.01

# Device (auto-detect if null)
device: null

# Data augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5

# Other settings
workers: 8
optimizer: auto
verbose: true
exist_ok: false
